steps:
  # --- Backend Build & Deploy ---
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/scam-guard-api', '-f', 'Dockerfile.api', '.']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/scam-guard-api']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'scam-guard-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/scam-guard-api'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GOOGLE_API_KEY=PLACEHOLDER_SEE_README'

  # --- Frontend Build & Deploy ---
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/scam-guard-web', '-f', 'Dockerfile.web', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/scam-guard-web']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'scam-guard-web'
      - '--image'
      - 'gcr.io/$PROJECT_ID/scam-guard-web'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NEXT_PUBLIC_API_URL=PLACEHOLDER_SEE_README'

images:
  - 'gcr.io/$PROJECT_ID/scam-guard-api'
  - 'gcr.io/$PROJECT_ID/scam-guard-web'
