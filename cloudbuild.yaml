steps:
  # --- Combined Build & Deploy ---
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/scam-guard-app', '.']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/scam-guard-app']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'scam-guard'
      - '--image'
      - 'gcr.io/$PROJECT_ID/scam-guard-app'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GOOGLE_API_KEY=PLACEHOLDER_SEE_README'

images:
  - 'gcr.io/$PROJECT_ID/scam-guard-app'
